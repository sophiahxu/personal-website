<!DOCTYPE html>
<html>
<title>Sophia Xu</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="main.css">

<body>

  <!-- Hamburger button for mobile -->
  <button class="hamburger" onclick="toggleSidebar()">
    <i class="fa fa-bars"></i>
  </button>

  <div class="page-wrapper">

    <!-- Vertical tab sidebar -->
    <nav class="tab-sidebar" id="sidebar">
      <div class="sidebar-header">Sophia Xu</div>
      <a href="#" onclick="return showSection('home')" id="tab-home"><i class="fa fa-home"></i> Home</a>
      <a href="#" onclick="return showSection('about')" id="tab-about"><i class="fa fa-user"></i> About</a>
      <a href="#" onclick="return showSection('portfolio')" id="tab-portfolio"><i class="fa fa-th"></i> Projects</a>
      <a href="#" onclick="return showSection('contact')" id="tab-contact"><i class="fa fa-envelope"></i> Contact</a>
      <a href="#" onclick="return showSection('funfacts')" id="tab-funfacts"><i class="fa fa-heart"></i> Fun Facts</a>
    </nav>

    <!-- Main content: one section visible at a time -->
    <div class="main-content">
      <section class="page-section" id="home"></section>
      <section class="page-section" id="about"></section>
      <section class="page-section" id="portfolio"></section>
      <section class="page-section" id="contact"></section>
      <section class="page-section" id="funfacts"></section>
    </div>

  </div>

  <script>
    const sections = ['home', 'about', 'portfolio', 'contact', 'funfacts'];
    const loaded = {};

    async function showSection(id) {
      // Fetch and inject content the first time
      if (!loaded[id]) {
        const res = await fetch('sections/' + id + '.html');
        const html = await res.text();
        document.getElementById(id).innerHTML = html;
        loaded[id] = true;
      }

      // Hide all, show target
      sections.forEach(function(s) {
        document.getElementById(s).style.display = 'none';
        document.getElementById('tab-' + s).classList.remove('active');
      });
      document.getElementById(id).style.display = 'block';
      document.getElementById('tab-' + id).classList.add('active');

      closeSidebar();
      return false;
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }

    // Start on Home
    showSection('home');
  </script>

</body>
</html>
