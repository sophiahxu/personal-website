<div class="w3-container w3-padding-64">
  <h3 class="w3-center">JUST FOR FUN</h3>
  <p class="w3-center" style="margin-bottom: 48px;"><em>A few things I love outside of work.</em></p>

  <div class="fun-grid">

    <div class="fun-card" onclick="document.getElementById('fun-sketching').style.display='block'">
      <div class="fun-card-img fun-placeholder-sketching"></div>
      <div class="fun-card-label">Sketching</div>
    </div>

    <div class="fun-card" onclick="document.getElementById('fun-painting').style.display='block'">
      <div class="fun-card-img fun-placeholder-painting"></div>
      <div class="fun-card-label">Painting</div>
    </div>

    <div class="fun-card" onclick="document.getElementById('fun-sf').style.display='block'">
      <div class="fun-card-img fun-placeholder-sf"></div>
      <div class="fun-card-label">Fun Days in SF</div>
    </div>

  </div>
</div>

<!-- Sketching Modal -->
<div id="fun-sketching" class="w3-modal" onclick="this.style.display='none'">
  <div class="w3-modal-content fun-modal-content" onclick="event.stopPropagation()">
    <span onclick="document.getElementById('fun-sketching').style.display='none'"
      class="w3-button w3-display-topright">&times;</span>
    <h2>Sketching</h2>
    <p>Images coming soon!</p>
  </div>
</div>

<!-- Painting Modal -->
<div id="fun-painting" class="w3-modal" onclick="this.style.display='none'">
  <div class="w3-modal-content fun-modal-content" onclick="event.stopPropagation()">
    <span onclick="document.getElementById('fun-painting').style.display='none'"
      class="w3-button w3-display-topright">&times;</span>
    <h2>Painting</h2>
    <p>Images coming soon!</p>
  </div>
</div>

<!-- Fun Days in SF Modal -->
<div id="fun-sf" class="w3-modal" onclick="this.style.display='none'">
  <div class="w3-modal-content fun-modal-content" onclick="event.stopPropagation()">
    <span onclick="document.getElementById('fun-sf').style.display='none'"
      class="w3-button w3-display-topright">&times;</span>
    <h2>Fun Days in SF</h2>
    <p>Images coming soon!</p>
  </div>
</div>
